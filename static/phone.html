<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tra cứu SĐT – Chiaki</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(255,182,213,.5) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 80%,rgba(167,210,255,.45) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 10%,rgba(198,181,255,.4) 0%,transparent 45%),
    linear-gradient(145deg,#fce8f3,#ede8ff,#e8f4ff,#e8fff4);
  color:#3b3551;
  padding:20px;
}

.card{
  width:100%;max-width:480px;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border:1px solid rgba(255,255,255,.8);
  border-radius:24px;
  box-shadow:0 20px 60px rgba(160,130,200,.25),inset 0 1.5px 0 rgba(255,255,255,.9);
  padding:32px;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.logo{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,#f9a8d4,#ec4899);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 14px;
  box-shadow:0 4px 16px rgba(236,72,153,.35);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 4px 16px rgba(236,72,153,.35)}
  50%{box-shadow:0 4px 28px rgba(236,72,153,.6),0 0 0 6px rgba(236,72,153,.12)}
}

.title{font-size:20px;font-weight:700;color:#3b3551;text-align:center;margin-bottom:4px}
.sub{font-size:12px;color:#9b8bb4;text-align:center;margin-bottom:24px}

.field{margin-bottom:12px}
.label{font-size:11px;font-weight:600;color:#9b8bb4;letter-spacing:.4px;margin-bottom:5px;display:block}
.inp{
  width:100%;padding:12px 14px;
  border:1.5px solid rgba(198,181,255,.5);
  border-radius:12px;font-size:13px;
  font-family:'Inter',monospace;
  background:rgba(255,255,255,.6);color:#3b3551;
  outline:none;transition:border .2s,box-shadow .2s;
}
.inp:focus{border-color:#a78bfa;box-shadow:0 0 0 3px rgba(167,139,250,.15)}
.inp::placeholder{color:#c0b0d8;font-family:'Inter',sans-serif}
.inp-mono{font-family:monospace;letter-spacing:.8px}
.key-status{font-size:11px;color:#9b8bb4;min-height:16px;margin-top:4px;transition:color .2s}

.btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-pink{
  background:linear-gradient(135deg,#f9a8d4,#ec4899);
  color:#fff;box-shadow:0 4px 16px rgba(236,72,153,.4);
}
.btn-pink:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(236,72,153,.5)}
.btn-pink:disabled{background:rgba(200,190,220,.4);color:rgba(100,80,140,.4);box-shadow:none;cursor:not-allowed;transform:none}

.error{
  font-size:12px;color:#dc2626;margin-top:12px;
  padding:10px 13px;background:rgba(254,202,202,.4);
  border-radius:10px;display:none;
  border:1px solid rgba(252,165,165,.3);
}
.error.show{display:block}

.result{
  margin-top:20px;display:none;
  border-top:1px solid rgba(198,181,255,.25);
  padding-top:18px;
  animation:fadeUp .3s ease;
}
.result.show{display:block}

.result-title{
  font-size:10px;font-weight:700;color:#9b8bb4;
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;
}

.phone-box{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(249,168,212,.25),rgba(236,72,153,.15));
  border:1px solid rgba(236,72,153,.3);
  border-radius:14px;padding:14px 16px;margin-bottom:16px;gap:12px;
}
.phone-number{
  font-size:24px;font-weight:800;color:#be185d;
  font-family:monospace;letter-spacing:1px;word-break:break-all;
}
.btn-copy{
  padding:7px 14px;border:1px solid rgba(236,72,153,.25);border-radius:10px;
  background:rgba(236,72,153,.12);color:#be185d;
  font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.btn-copy:hover{background:rgba(236,72,153,.28)}
.btn-copy.copied{background:rgba(110,231,183,.3);color:#065f46;border-color:rgba(110,231,183,.4)}

.row{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;padding:9px 0;
  border-bottom:1px solid rgba(198,181,255,.15);
}
.row:last-of-type{border-bottom:none}
.row-label{font-size:11px;font-weight:600;color:#9b8bb4;min-width:100px;margin-top:1px;flex-shrink:0}
.row-val{font-size:12px;font-weight:600;color:#3b3551;flex:1;text-align:right;word-break:break-word;line-height:1.5}

.remaining-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(167,243,208,.3);color:#065f46;
  border:1px solid rgba(110,231,183,.4);margin-top:12px;
}
.remaining-badge.warn{background:rgba(253,230,138,.3);color:#92400e;border-color:rgba(252,211,77,.4)}
.remaining-badge.empty{background:rgba(254,202,202,.3);color:#991b1b;border-color:rgba(252,165,165,.4)}

.back-link{
  display:block;text-align:center;margin-top:22px;
  font-size:12px;color:#9b8bb4;text-decoration:none;transition:color .2s;
}
.back-link:hover{color:#7c3aed}
</style>
</head>
<body>

<div class="card">
  <div class="logo">📞</div>
  <div class="title">Tra cứu SĐT khách hàng</div>
  <div class="sub">Nhập mã đơn hàng và key để xem số điện thoại</div>

  <div class="field">
    <label class="label">MÃ ĐƠN HÀNG</label>
    <input class="inp inp-mono" id="inpCode" type="text"
           placeholder="VD: R8547883114"
           onkeydown="if(event.key==='Enter')doSearch()"/>
  </div>

  <div class="field">
    <label class="label">KEY TRA CỨU</label>
    <input class="inp inp-mono" id="inpKey" type="text"
           placeholder="KEYPHONE-XXXXX-XXXXXX-XXXXX"
           onkeydown="if(event.key==='Enter')doSearch()"/>
    <div class="key-status" id="keyStatus"></div>
  </div>

  <button class="btn btn-pink" id="btnSearch" onclick="doSearch()">
    🔍&nbsp; Tra cứu số điện thoại
  </button>

  <div class="error" id="errBox"></div>

  <div class="result" id="resultBox">
    <!-- Phone nổi bật -->
    <div class="phone-box">
      <div>
        <div style="font-size:10px;font-weight:700;color:#be185d;letter-spacing:.4px;margin-bottom:4px">SỐ ĐIỆN THOẠI</div>
        <div class="phone-number" id="resPhone">—</div>
      </div>
      <button class="btn-copy" id="btnCopyPhone" onclick="copyPhone()">Copy</button>
    </div>

    <div class="result-title">Thông tin đơn hàng</div>
    <div class="row"><span class="row-label">Mã đơn</span><span class="row-val" id="resCode">—</span></div>
    <div class="row"><span class="row-label">Gian hàng</span><span class="row-val" id="resShop">—</span></div>
    <div class="row"><span class="row-label">Ngày đặt</span><span class="row-val" id="resDate">—</span></div>
    <div class="row"><span class="row-label">Tên khách</span><span class="row-val" id="resName">—</span></div>
    <div class="row"><span class="row-label">Địa chỉ</span><span class="row-val" id="resAddress">—</span></div>
    <div class="row"><span class="row-label">Sản phẩm</span><span class="row-val" id="resProduct">—</span></div>
    <div class="row"><span class="row-label">Thanh toán</span><span class="row-val" id="resPayment">—</span></div>

    <div style="text-align:center" id="remainingWrap"></div>
  </div>
</div>
<script>

let keyTimer;
document.getElementById('inpKey').addEventListener('input', () => {
  clearTimeout(keyTimer);
  const statusEl = document.getElementById('keyStatus');
  const val = document.getElementById('inpKey').value.trim();
  if (!val) { statusEl.textContent = ''; return; }
  keyTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/order-info/check-key', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key: val})
      });
      const d = await res.json();
      if (d.error) {
        statusEl.textContent = d.error;
        statusEl.style.color = '#dc2626';
      } else {
        const r = d.remaining;
        statusEl.textContent = d.unlimited ? 'Key không giới hạn ✓'
          : `Key hợp lệ — còn ${r}/${d.limit} lượt`;
        statusEl.style.color = r > 0 || d.unlimited ? '#059669' : '#dc2626';
      }
    } catch { statusEl.textContent = ''; }
  }, 600);
});

async function doSearch() {
  const code   = document.getElementById('inpCode').value.trim();
  const key    = document.getElementById('inpKey').value.trim();
  const errEl  = document.getElementById('errBox');
  const resEl  = document.getElementById('resultBox');
  const btn    = document.getElementById('btnSearch');

  errEl.classList.remove('show');
  resEl.classList.remove('show');

  if (!code) { showErr('Vui lòng nhập mã đơn hàng.'); return; }
  if (!key)  { showErr('Vui lòng nhập key tra cứu.'); return; }

  btn.disabled = true;
  btn.innerHTML = '⏳&nbsp; Đang tra cứu...';
  localStorage.setItem('lastPhoneKey', key);

  try {
    const res = await fetch('/api/order-info', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({order_code: code, key})
    });
    const data = await res.json();
    if (data.error) { showErr(data.error); return; }

    document.getElementById('resPhone').textContent   = data.phone       || 'Không có';
    document.getElementById('resCode').textContent    = data.orde_rcode   || code;
    document.getElementById('resShop').textContent    = data.shop_name    || '—';
    document.getElementById('resDate').textContent    = data.order_date   || '—';
    document.getElementById('resName').textContent    = data.customer_name || data.receivername || '—';
    document.getElementById('resAddress').textContent = data.address     || '—';
    document.getElementById('resProduct').textContent = data.product     || '—';
    document.getElementById('resPayment').textContent = data.payment     || '—';

    const wrap = document.getElementById('remainingWrap');
    if (data.remaining === -1) {
      wrap.innerHTML = `<span class="remaining-badge">∞ Key không giới hạn</span>`;
    } else if (data.remaining > 0) {
      wrap.innerHTML = `<span class="remaining-badge${data.remaining <= 2 ? ' warn' : ''}">🔑 Còn ${data.remaining} lượt</span>`;
    } else {
      wrap.innerHTML = `<span class="remaining-badge empty">🔑 Hết lượt</span>`;
    }

    // Reset copy btn
    const cpBtn = document.getElementById('btnCopyPhone');
    cpBtn.textContent = 'Copy';
    cpBtn.classList.remove('copied');

    resEl.classList.add('show');
  } catch(e) {
    showErr('Lỗi kết nối: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍&nbsp; Tra cứu số điện thoại';
  }
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg;
  el.classList.add('show');
}

function copyPhone() {
  const phone = document.getElementById('resPhone').textContent.trim();
  const btn   = document.getElementById('btnCopyPhone');
  const done  = () => {
    btn.textContent = '✓ Đã copy';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  };
  navigator.clipboard.writeText(phone).then(done).catch(() => {
    const el = document.createElement('textarea');
    el.value = phone; document.body.appendChild(el);
    el.select(); document.execCommand('copy');
    document.body.removeChild(el); done();
  });
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('lastPhoneKey');
  if (saved) document.getElementById('inpKey').value = saved;
});
</script>
</body>
</html>
